<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webapp de Soporte Local - Servidor</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        darker: '#020617',
                        panel: '#1e293b',
                        primary: '#3b82f6',
                        accent: '#10b981'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ICONOS SVG ---
        const Icons = {
            Dashboard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>,
            Modules: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>,
            Map: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>,
            Scan: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>,
            History: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Settings: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>,
            Server: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>,
            Cloud: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>,
            X: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>,
            Alert: () => <svg className="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        };

        // --- DATOS INICIALES MOCKEADOS ---
        const initialSchema = ['estacionamiento_capacidad', 'estacionamiento_ocupacion', 'barrera_estado', 'app_version', 'app_sesiones_activas', 'nube_ultima_sync', 'vpn_activa'];
        
        const initialModules = {
            Estacionamiento: {
                estacionamiento_capacidad: 500,
                estacionamiento_ocupacion: 342,
                barrera_estado: 'abierta'
            },
            Aplicacion: {
                app_version: 'v4.2.1',
                app_sesiones_activas: 18
            },
            Red_y_Nube: {
                nube_ultima_sync: '2026-04-24 07:35:00',
                vpn_activa: 'si'
            }
        };

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
            // Estado Global
            const [activeTab, setActiveTab] = useState('dashboard');
            const [serverIp, setServerIp] = useState('10.8.0.45');
            const [isConnected, setIsConnected] = useState(false);
            const [heartbeatCount, setHeartbeatCount] = useState(0);
            
            // Permisos y Configuración
            const [currentUserRole, setCurrentUserRole] = useState('admin'); // admin, support, viewer
            const [globalEditEnabled, setGlobalEditEnabled] = useState(false);
            
            // Datos
            const [modulesData, setModulesData] = useState(initialModules);
            const [logs, setLogs] = useState([]);

            // Simulador de Heartbeat
            useEffect(() => {
                let interval;
                if (isConnected) {
                    interval = setInterval(() => {
                        setHeartbeatCount(c => c + 1);
                    }, 3000);
                }
                return () => clearInterval(interval);
            }, [isConnected]);

            // Sistema de Logs (Auditoría)
            const addLog = (action, details, oldData = null, newData = null) => {
                const newLog = {
                    id: Date.now(),
                    timestamp: new Date().toISOString(),
                    userRole: currentUserRole,
                    action,
                    details,
                    diff: { old: oldData, new: newData }
                };
                setLogs(prev => [newLog, ...prev]);
            };

            const handleConnect = () => {
                if (!serverIp) {
                    alert("Introduce una IP válida a través de la VPN");
                    return;
                }
                setIsConnected(!isConnected);
                addLog(isConnected ? "DESCONEXIÓN" : "CONEXIÓN", `Servidor local en ${serverIp}`);
            };

            const hasPermission = () => ['admin', 'support'].includes(currentUserRole);

            return (
                <div className="flex h-screen overflow-hidden bg-darker text-sm">
                    {/* SIDEBAR */}
                    <aside className="w-64 bg-dark border-r border-slate-800 flex flex-col">
                        <div className="p-4 border-b border-slate-800 flex items-center space-x-3">
                            <div className="w-8 h-8 rounded bg-primary flex items-center justify-center text-white font-bold">
                                JP
                            </div>
                            <div>
                                <h1 className="font-bold text-slate-100">SoporteApp</h1>
                                <p className="text-xs text-slate-400">Ver. Local Integrada</p>
                            </div>
                        </div>

                        <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
                            {[
                                { id: 'dashboard', icon: Icons.Dashboard, label: 'Dashboard General' },
                                { id: 'modules', icon: Icons.Modules, label: 'Edición de Módulos' },
                                { id: 'mapping', icon: Icons.Map, label: 'Mapeo I/O (JSON)' },
                                { id: 'scanner', icon: Icons.Scan, label: 'Escáner de Red' },
                                { id: 'history', icon: Icons.History, label: 'Historial / Auditoría' },
                                { id: 'settings', icon: Icons.Settings, label: 'Configuración' }
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center space-x-3 px-3 py-2 rounded-lg transition-colors ${activeTab === item.id ? 'bg-primary text-white' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}
                                >
                                    <item.icon />
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        
                        <div className="p-4 border-t border-slate-800">
                            <p className="text-xs text-slate-500 mb-2">Rol Actual:</p>
                            <select 
                                value={currentUserRole} 
                                onChange={(e) => {
                                    setCurrentUserRole(e.target.value);
                                    addLog("CAMBIO_ROL", `El usuario cambió su rol a ${e.target.value}`);
                                }}
                                className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1 text-slate-200 outline-none focus:border-primary"
                            >
                                <option value="admin">Administrador (Total)</option>
                                <option value="support">Soporte (Limitado)</option>
                                <option value="viewer">Lector (Solo vista)</option>
                            </select>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-screen relative">
                        {/* TOPBAR */}
                        <header className="h-16 bg-panel border-b border-slate-800 flex items-center justify-between px-6 z-10">
                            <div className="flex items-center space-x-4">
                                <span className="text-slate-400 font-medium tracking-wide">
                                    CONEXIÓN VPN/LOCAL
                                </span>
                                <div className="flex items-center space-x-2 bg-dark rounded border border-slate-700 px-2 py-1">
                                    <Icons.Server />
                                    <input 
                                        type="text" 
                                        value={serverIp}
                                        onChange={e => setServerIp(e.target.value)}
                                        disabled={isConnected}
                                        placeholder="192.168.x.x / 10.x.x.x"
                                        className="bg-transparent border-none outline-none text-slate-200 w-40 text-sm disabled:opacity-50"
                                    />
                                </div>
                                <button 
                                    onClick={handleConnect}
                                    className={`px-4 py-1.5 rounded font-medium transition-colors ${isConnected ? 'bg-rose-500/20 text-rose-400 hover:bg-rose-500/30' : 'bg-primary/20 text-primary hover:bg-primary/30'}`}
                                >
                                    {isConnected ? 'Desconectar' : 'Conectar al Servidor'}
                                </button>
                            </div>

                            <div className="flex items-center space-x-4">
                                {isConnected ? (
                                    <div className="flex items-center space-x-2 text-accent">
                                        <div className="w-3 h-3 bg-accent rounded-full pulse-dot"></div>
                                        <span className="text-sm font-medium tracking-wider">HEARTBEAT OK ({heartbeatCount})</span>
                                    </div>
                                ) : (
                                    <div className="flex items-center space-x-2 text-slate-500">
                                        <div className="w-3 h-3 bg-slate-600 rounded-full"></div>
                                        <span className="text-sm font-medium">SIN CONEXIÓN</span>
                                    </div>
                                )}
                            </div>
                        </header>

                        {/* TAB CONTENT */}
                        <div className="flex-1 overflow-y-auto p-6 bg-darker">
                            {activeTab === 'dashboard' && <DashboardTab modulesData={modulesData} isConnected={isConnected} />}
                            {activeTab === 'modules' && <ModulesTab 
                                data={modulesData} 
                                setData={setModulesData} 
                                globalEdit={globalEditEnabled} 
                                canEdit={hasPermission()}
                                addLog={addLog}
                            />}
                            {activeTab === 'mapping' && <MappingTab 
                                data={modulesData} 
                                setData={setModulesData} 
                                schema={initialSchema}
                                addLog={addLog}
                                canEdit={hasPermission()}
                            />}
                            {activeTab === 'scanner' && <ScannerTab setIp={setServerIp} />}
                            {activeTab === 'history' && <HistoryTab logs={logs} />}
                            {activeTab === 'settings' && <SettingsTab 
                                globalEdit={globalEditEnabled} 
                                setGlobalEdit={setGlobalEditEnabled}
                                canEdit={currentUserRole === 'admin'}
                                addLog={addLog}
                            />}
                        </div>
                    </main>
                </div>
            );
        };

        // --- SUB-COMPONENTES (VISTAS) ---

        const DashboardTab = ({ modulesData, isConnected }) => {
            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-bold text-slate-100 flex items-center"><Icons.Dashboard/><span className="ml-2">Visión Global</span></h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Server Status Card */}
                        <div className="bg-panel rounded-xl p-5 border border-slate-700 shadow-lg">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-slate-400 font-semibold flex items-center"><Icons.Server/><span className="ml-2">Servidor Local</span></h3>
                                <span className={`px-2 py-1 rounded text-xs font-bold ${isConnected ? 'bg-accent/20 text-accent' : 'bg-rose-500/20 text-rose-400'}`}>
                                    {isConnected ? 'EN LÍNEA' : 'FUERA DE LÍNEA'}
                                </span>
                            </div>
                            <div className="space-y-3">
                                <div className="flex justify-between">
                                    <span className="text-slate-500">Versión App</span>
                                    <span className="text-slate-200">{modulesData.Aplicacion.app_version}</span>
                                </div>
                                <div className="flex justify-between">
                                    <span className="text-slate-500">Sesiones</span>
                                    <span className="text-slate-200 font-mono bg-slate-800 px-2 rounded">{modulesData.Aplicacion.app_sesiones_activas}</span>
                                </div>
                            </div>
                        </div>

                        {/* Parking Status Card */}
                        <div className="bg-panel rounded-xl p-5 border border-slate-700 shadow-lg">
                            <h3 className="text-slate-400 font-semibold mb-4 flex items-center">
                                <svg className="w-5 h-5 ml-1 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"></path></svg>
                                Estacionamiento
                            </h3>
                            <div className="mb-4">
                                <div className="flex justify-between mb-1 text-sm">
                                    <span className="text-slate-400">Ocupación</span>
                                    <span className="text-slate-200">{modulesData.Estacionamiento.estacionamiento_ocupacion} / {modulesData.Estacionamiento.estacionamiento_capacidad}</span>
                                </div>
                                <div className="w-full bg-slate-800 rounded-full h-2.5">
                                    <div className="bg-primary h-2.5 rounded-full" style={{width: `${(modulesData.Estacionamiento.estacionamiento_ocupacion / modulesData.Estacionamiento.estacionamiento_capacidad) * 100}%`}}></div>
                                </div>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-slate-500">Estado Barrera Principal</span>
                                <span className={`px-2 py-0.5 rounded text-xs font-bold uppercase ${modulesData.Estacionamiento.barrera_estado === 'abierta' ? 'bg-accent/20 text-accent' : 'bg-yellow-500/20 text-yellow-500'}`}>
                                    {modulesData.Estacionamiento.barrera_estado}
                                </span>
                            </div>
                        </div>

                        {/* Cloud Sync Card */}
                        <div className="bg-panel rounded-xl p-5 border border-slate-700 shadow-lg">
                            <h3 className="text-slate-400 font-semibold mb-4 flex items-center"><Icons.Cloud/><span className="ml-2">Estado Nube</span></h3>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center">
                                    <span className="text-slate-500">Última Sincronización</span>
                                    <span className="text-slate-300 text-xs">{modulesData.Red_y_Nube.nube_ultima_sync}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-slate-500">Túnel VPN</span>
                                    <span className="text-accent flex items-center"><Icons.Check/> <span className="ml-1 uppercase text-xs font-bold">{modulesData.Red_y_Nube.vpn_activa}</span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ModulesTab = ({ data, setData, globalEdit, canEdit, addLog }) => {
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xl font-bold text-slate-100 flex items-center"><Icons.Modules/><span className="ml-2">Edición de Módulos</span></h2>
                        {!globalEdit && (
                            <span className="text-rose-400 text-xs bg-rose-500/10 px-2 py-1 rounded border border-rose-500/20 flex items-center">
                                <Icons.Alert/><span className="ml-1">Edición global deshabilitada en Configuración</span>
                            </span>
                        )}
                        {!canEdit && globalEdit && (
                            <span className="text-yellow-400 text-xs bg-yellow-500/10 px-2 py-1 rounded border border-yellow-500/20">
                                Permisos insuficientes (Modo Lector)
                            </span>
                        )}
                    </div>

                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        {Object.entries(data).map(([moduleName, moduleData]) => (
                            <ModuleCard 
                                key={moduleName}
                                name={moduleName}
                                initialData={moduleData}
                                onSave={(newData) => {
                                    const oldData = {...data[moduleName]};
                                    setData(prev => ({...prev, [moduleName]: newData}));
                                    addLog(`EDICIÓN_MÓDULO`, `Módulo ${moduleName} actualizado`, oldData, newData);
                                }}
                                globalEdit={globalEdit}
                                canEdit={canEdit}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const ModuleCard = ({ name, initialData, onSave, globalEdit, canEdit }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [editData, setEditData] = useState(initialData);
            const [error, setError] = useState('');

            // Resetear data si cancelan
            useEffect(() => { setEditData(initialData); }, [initialData, isEditing]);

            const handleSave = () => {
                // Mock: 52 mil validaciones
                for (const [key, value] of Object.entries(editData)) {
                    if (value === '') {
                        setError(`El campo ${key} no puede estar vacío.`);
                        return;
                    }
                    if (key.includes('capacidad') && isNaN(value)) {
                        setError(`Capacidad debe ser un número válido.`);
                        return;
                    }
                }
                setError('');
                onSave(editData);
                setIsEditing(false);
            };

            const handleChange = (k, v) => {
                setEditData(prev => ({...prev, [k]: v}));
            };

            const isEditable = globalEdit && canEdit;

            return (
                <div className="bg-panel border border-slate-700 rounded-xl overflow-hidden shadow-lg transition-all">
                    <div className="bg-slate-800/50 px-4 py-3 border-b border-slate-700 flex justify-between items-center">
                        <h3 className="font-bold text-slate-200 capitalize">{name.replace(/_/g, ' ')}</h3>
                        {!isEditing ? (
                            <button 
                                onClick={() => setIsEditing(true)}
                                disabled={!isEditable}
                                className={`text-xs px-3 py-1 rounded transition-colors ${isEditable ? 'bg-primary/20 text-primary hover:bg-primary/40' : 'bg-slate-700 text-slate-500 cursor-not-allowed'}`}
                            >
                                Habilitar Cambios
                            </button>
                        ) : (
                            <span className="text-xs text-accent font-bold animate-pulse">Modo Edición...</span>
                        )}
                    </div>
                    
                    <div className="p-4 space-y-3">
                        {error && <div className="bg-rose-500/10 border border-rose-500 text-rose-400 text-xs p-2 rounded">{error}</div>}
                        
                        {Object.entries(isEditing ? editData : initialData).map(([k, v]) => (
                            <div key={k} className="flex flex-col sm:flex-row sm:justify-between sm:items-center space-y-1 sm:space-y-0">
                                <label className="text-slate-400 text-xs font-mono">{k}</label>
                                {isEditing ? (
                                    <input 
                                        type="text" 
                                        value={v} 
                                        onChange={(e) => handleChange(k, e.target.value)}
                                        className="bg-darker border border-slate-600 rounded px-2 py-1 text-slate-200 focus:border-primary outline-none font-mono text-sm sm:w-1/2"
                                    />
                                ) : (
                                    <span className="text-slate-200 font-mono text-sm bg-slate-800/50 px-2 py-1 rounded sm:w-1/2 truncate text-right">{v}</span>
                                )}
                            </div>
                        ))}
                    </div>

                    {isEditing && (
                        <div className="bg-slate-800/50 px-4 py-3 border-t border-slate-700 flex justify-end space-x-2">
                            <button 
                                onClick={() => { setIsEditing(false); setError(''); }}
                                className="flex items-center space-x-1 text-xs px-3 py-1.5 rounded bg-slate-700 text-slate-300 hover:bg-slate-600"
                            >
                                <Icons.X /> <span>Cancelar</span>
                            </button>
                            <button 
                                onClick={handleSave}
                                className="flex items-center space-x-1 text-xs px-3 py-1.5 rounded bg-accent text-darker font-bold hover:bg-emerald-400"
                            >
                                <Icons.Check /> <span>Guardar Cambios</span>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const MappingTab = ({ data, setData, schema, addLog, canEdit }) => {
            // Aplanar data para el JSON
            const flattenData = () => {
                let flat = {};
                Object.values(data).forEach(mod => { flat = {...flat, ...mod} });
                return JSON.stringify(flat, null, 4);
            };

            const [jsonText, setJsonText] = useState(flattenData());
            const [status, setStatus] = useState({ type: '', msg: '' });
            const [unrecognized, setUnrecognized] = useState([]);

            useEffect(() => {
                // Actualizar textarea si la data cambia desde otro lado
                setJsonText(flattenData());
            }, [data]);

            const handleTestMapeo = () => {
                if (!canEdit) {
                    setStatus({ type: 'error', msg: 'Permisos insuficientes para mapear parámetros.' });
                    return;
                }
                try {
                    const parsed = JSON.parse(jsonText);
                    const incomingKeys = Object.keys(parsed);
                    
                    // Buscar desconocidos/obsoletos
                    const unknown = incomingKeys.filter(k => !schema.includes(k));
                    setUnrecognized(unknown);

                    if (unknown.length > 0) {
                        setStatus({ type: 'warning', msg: `Se encontraron ${unknown.length} parámetros desconocidos/obsoletos.` });
                    } else {
                        setStatus({ type: 'success', msg: 'JSON válido. Todos los parámetros reconocidos.' });
                    }

                    // Reconstruir estructura de módulos (lógica simple para el mockup)
                    const newData = JSON.parse(JSON.stringify(data)); // deep copy
                    let updatedCount = 0;
                    
                    Object.keys(newData).forEach(modName => {
                        Object.keys(newData[modName]).forEach(key => {
                            if (parsed[key] !== undefined) {
                                newData[modName][key] = parsed[key];
                                updatedCount++;
                            }
                        });
                    });

                    setData(newData);
                    addLog('MAPEO_JSON', `Importación JSON: ${updatedCount} actualizados, ${unknown.length} desconocidos ignorados.`);

                } catch (e) {
                    setStatus({ type: 'error', msg: 'Error de sintaxis JSON: ' + e.message });
                }
            };

            return (
                <div className="space-y-4 flex flex-col h-full">
                    <h2 className="text-xl font-bold text-slate-100 flex items-center"><Icons.Map/><span className="ml-2">Mapeo I/O de Parámetros</span></h2>
                    <p className="text-slate-400 text-sm">
                        Solicita a Edbin/Servidor un JSON estructurado para probar el mapeo. Pega el JSON aquí y el sistema identificará versiones anteriores o parámetros obsoletos.
                    </p>

                    {status.msg && (
                        <div className={`p-3 rounded border text-sm ${status.type === 'error' ? 'bg-rose-500/10 border-rose-500 text-rose-400' : status.type === 'warning' ? 'bg-yellow-500/10 border-yellow-500 text-yellow-400' : 'bg-accent/10 border-accent text-accent'}`}>
                            {status.msg}
                        </div>
                    )}

                    {unrecognized.length > 0 && (
                        <div className="bg-darker border border-yellow-500/30 rounded p-3">
                            <h4 className="text-yellow-500 text-xs font-bold uppercase mb-2 flex items-center"><Icons.Alert/><span className="ml-1">Parámetros Obsoletos/Desconocidos Detectados:</span></h4>
                            <div className="flex flex-wrap gap-2">
                                {unrecognized.map(k => (
                                    <span key={k} className="bg-yellow-500/20 text-yellow-300 text-xs font-mono px-2 py-1 rounded border border-yellow-500/50">
                                        {k}
                                    </span>
                                ))}
                            </div>
                            <p className="text-xs text-slate-500 mt-2">El servidor local rechazará estos parámetros al guardar, pero la vista de soporte permite verlos.</p>
                        </div>
                    )}

                    <div className="flex-1 min-h-[300px] flex flex-col">
                        <textarea 
                            value={jsonText}
                            onChange={(e) => setJsonText(e.target.value)}
                            className="flex-1 w-full bg-slate-900 border border-slate-700 rounded-lg p-4 font-mono text-sm text-primary outline-none focus:border-primary resize-none"
                            placeholder="Pega el JSON aquí..."
                        />
                    </div>
                    
                    <div className="flex justify-end space-x-3">
                        <button 
                            onClick={() => {setJsonText(flattenData()); setStatus({type:'',msg:''}); setUnrecognized([]);}}
                            className="px-4 py-2 rounded bg-slate-800 text-slate-300 hover:bg-slate-700 text-sm"
                        >
                            Resetear al Estado Actual
                        </button>
                        <button 
                            onClick={handleTestMapeo}
                            className="px-4 py-2 rounded bg-primary text-white font-bold hover:bg-blue-600 text-sm flex items-center"
                        >
                            <Icons.Check/> <span className="ml-2">Probar y Aplicar Mapeo</span>
                        </button>
                    </div>
                </div>
            );
        };

        const ScannerTab = ({ setIp }) => {
            const [scanning, setScanning] = useState(false);
            const [results, setResults] = useState([]);
            const [progress, setProgress] = useState(0);

            const handleScan = () => {
                setScanning(true);
                setResults([]);
                setProgress(0);

                // Simulación inteligente de escaneo
                let p = 0;
                const interval = setInterval(() => {
                    p += 15;
                    setProgress(p > 100 ? 100 : p);
                    
                    if (p === 30) {
                        setResults(r => [...r, { ip: '10.8.0.12', type: 'Gateway', conf: 'Baja' }]);
                    }
                    if (p === 75) {
                        setResults(r => [...r, { ip: '10.8.0.45', type: 'Servidor Local Estacionamiento', conf: 'Alta (Match Heurístico)' }]);
                    }

                    if (p >= 100) {
                        clearInterval(interval);
                        setScanning(false);
                    }
                }, 500);
            };

            return (
                <div className="space-y-6 max-w-3xl">
                    <h2 className="text-xl font-bold text-slate-100 flex items-center"><Icons.Scan/><span className="ml-2">Identificador Inteligente de Red</span></h2>
                    
                    <div className="bg-panel border border-slate-700 rounded-xl p-6">
                        <p className="text-slate-400 mb-4 text-sm">
                            Realiza un barrido en el rango de la VPN y subredes locales para encontrar automáticamente la instancia del servidor.
                        </p>

                        <button 
                            onClick={handleScan}
                            disabled={scanning}
                            className={`w-full py-3 rounded-lg font-bold flex justify-center items-center ${scanning ? 'bg-slate-700 text-slate-400 cursor-wait' : 'bg-primary text-white hover:bg-blue-600'}`}
                        >
                            {scanning ? (
                                <><div className="w-4 h-4 border-2 border-slate-400 border-t-transparent rounded-full animate-spin mr-2"></div> Escaneando...</>
                            ) : (
                                <><Icons.Scan/><span className="ml-2">Iniciar Escaneo</span></>
                            )}
                        </button>

                        {scanning && (
                            <div className="mt-4 h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                                <div className="h-full bg-accent transition-all duration-300" style={{width: `${progress}%`}}></div>
                            </div>
                        )}

                        {results.length > 0 && (
                            <div className="mt-6 space-y-3">
                                <h4 className="text-slate-200 font-semibold border-b border-slate-700 pb-2">Resultados ({results.length}):</h4>
                                {results.map((res, i) => (
                                    <div key={i} className="flex justify-between items-center bg-darker p-3 rounded border border-slate-800 hover:border-primary transition-colors cursor-pointer group" onClick={() => setIp(res.ip)}>
                                        <div>
                                            <div className="font-mono text-primary font-bold">{res.ip}</div>
                                            <div className="text-xs text-slate-500">{res.type}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-xs text-slate-400">Confianza</div>
                                            <div className={`text-xs font-bold ${res.conf.includes('Alta') ? 'text-accent' : 'text-yellow-500'}`}>{res.conf}</div>
                                        </div>
                                        <div className="opacity-0 group-hover:opacity-100 transition-opacity">
                                            <span className="text-xs bg-primary/20 text-primary px-2 py-1 rounded">Usar IP</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const HistoryTab = ({ logs }) => {
            return (
                <div className="space-y-4 flex flex-col h-full">
                    <h2 className="text-xl font-bold text-slate-100 flex items-center"><Icons.History/><span className="ml-2">Auditoría y Log de Acciones</span></h2>
                    
                    <div className="flex-1 bg-panel border border-slate-700 rounded-xl overflow-hidden flex flex-col">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-800 text-slate-400 uppercase text-xs">
                                    <tr>
                                        <th className="px-4 py-3">Timestamp</th>
                                        <th className="px-4 py-3">Usuario/Rol</th>
                                        <th className="px-4 py-3">Acción</th>
                                        <th className="px-4 py-3">Detalle (Human-Readable)</th>
                                        <th className="px-4 py-3">Machine Data (JSON)</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800">
                                    {logs.length === 0 ? (
                                        <tr><td colSpan="5" className="text-center py-8 text-slate-500">No hay acciones registradas en esta sesión.</td></tr>
                                    ) : (
                                        logs.map(log => (
                                            <tr key={log.id} className="hover:bg-slate-800/50 transition-colors">
                                                <td className="px-4 py-3 font-mono text-xs text-slate-500">{new Date(log.timestamp).toLocaleTimeString()}</td>
                                                <td className="px-4 py-3"><span className="bg-slate-800 px-2 py-1 rounded text-xs text-primary font-bold uppercase">{log.userRole}</span></td>
                                                <td className="px-4 py-3 font-bold text-slate-300">{log.action}</td>
                                                <td className="px-4 py-3 text-slate-400">{log.details}</td>
                                                <td className="px-4 py-3">
                                                    {log.diff.new ? (
                                                        <details className="text-xs">
                                                            <summary className="cursor-pointer text-primary hover:text-blue-400">Ver JSON Diff</summary>
                                                            <div className="mt-2 p-2 bg-darker rounded overflow-x-auto max-w-xs font-mono text-emerald-400 whitespace-pre">
                                                                {JSON.stringify(log.diff.new, null, 2)}
                                                            </div>
                                                        </details>
                                                    ) : <span className="text-slate-600 text-xs">N/A</span>}
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsTab = ({ globalEdit, setGlobalEdit, canEdit, addLog }) => {
            return (
                <div className="space-y-6 max-w-2xl">
                    <h2 className="text-xl font-bold text-slate-100 flex items-center"><Icons.Settings/><span className="ml-2">Configuración del Panel</span></h2>
                    
                    <div className="bg-panel border border-slate-700 rounded-xl p-6 space-y-6">
                        
                        <div className="flex items-center justify-between border-b border-slate-800 pb-6">
                            <div>
                                <h3 className="text-slate-200 font-bold text-base">Habilitar Edición de Módulos (Global)</h3>
                                <p className="text-slate-500 text-sm mt-1">Permite que los botones de edición en cada módulo se activen. Si se apaga, toda la webapp es de solo lectura.</p>
                            </div>
                            <label className="relative inline-flex items-center cursor-pointer">
                                <input 
                                    type="checkbox" 
                                    className="sr-only peer"
                                    checked={globalEdit}
                                    disabled={!canEdit}
                                    onChange={(e) => {
                                        setGlobalEdit(e.target.checked);
                                        addLog("CONFIG_SISTEMA", `Edición Global cambiada a: ${e.target.checked ? 'ACTIVO' : 'INACTIVO'}`);
                                    }}
                                />
                                <div className={`w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all ${globalEdit ? 'bg-primary' : ''} ${!canEdit ? 'opacity-50 cursor-not-allowed' : ''}`}></div>
                            </label>
                        </div>

                        {!canEdit && (
                            <div className="bg-rose-500/10 border border-rose-500 p-3 rounded flex items-start space-x-3 text-rose-400 text-sm">
                                <Icons.Alert />
                                <span>No tienes permisos para modificar la configuración global. Debes tener el rol de Administrador.</span>
                            </div>
                        )}

                        <div>
                            <h3 className="text-slate-200 font-bold text-base mb-2">Acerca de esta Herramienta</h3>
                            <p className="text-slate-400 text-sm leading-relaxed">
                                Aplicación de soporte local offline. Desarrollada en un único archivo HTML portatil.<br/>
                                <strong>Funciones base:</strong> Interceptador de VPN, Validador JSON de parámetros en tiempo real, Historial Machine-Readable para depuración de estados.
                            </p>
                        </div>

                    </div>
                </div>
            );
        };

        // Renderizar la App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
